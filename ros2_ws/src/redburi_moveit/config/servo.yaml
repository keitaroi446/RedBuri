servo_node:
  ros__parameters:
    moveit_servo:
      use_gazebo: false

      command_in_type: "speed_units"

      scale:
        linear: 0.2
        rotational: 0.8
        joint: 0.5

      publish_period: 0.01
      low_latency_mode: false

      command_out_type: trajectory_msgs/JointTrajectory
      publish_joint_positions: true
      publish_joint_velocities: true
      publish_joint_accelerations: false

      smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"
      is_primary_planning_scene_monitor: true

      move_group_name: arm
      planning_frame: base_mount
      ee_frame_name: tool0
      robot_link_command_frame: link_6

      incoming_command_timeout: 0.1
      num_outgoing_halt_msgs_to_publish: 4
      lower_singularity_threshold: 25.0
      hard_stop_singularity_threshold: 45.0
      leaving_singularity_threshold_multiplier: 3.0
      joint_limit_margin: 0.1

      cartesian_command_in_topic: /servo_node/delta_twist_cmds
      joint_command_in_topic: /servo_node/delta_joint_cmds
      joint_topic: /joint_states
      status_topic: /servo_node/status
      command_out_topic: /servo_node/joint_trajectory

      check_collisions: false
      collision_check_rate: 10.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.02
